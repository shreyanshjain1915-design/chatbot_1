<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SiteBot AI — Website Builder & Marketing Suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Cabinet+Grotesk:wght@400;500;700;800&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:       #060610;
  --s1:       #0c0c1a;
  --s2:       #111124;
  --s3:       #181830;
  --border:   rgba(255,255,255,0.06);
  --bhi:      rgba(99,179,237,0.35);
  --a1:       #63b3ed;   /* builder — sky blue   */
  --a2:       #68d391;   /* seo     — mint green  */
  --a3:       #f6ad55;   /* generate— amber       */
  --red:      #fc8181;
  --text:     #e8e8f0;
  --mid:      #9090b0;
  --muted:    #55556a;
  --user-bg:  #141430;
  --bot-bg:   #0d0d1e;
  --r:        14px;
  --fh:       'Clash Display',sans-serif;
  --fb:       'Cabinet Grotesk',sans-serif;
  --fm:       'Fira Code',monospace;
}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fb);overflow:hidden}

/* ── grain ── */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9000;
  opacity:.35;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E")}

/* ── blobs ── */
.blob{position:fixed;border-radius:50%;filter:blur(110px);pointer-events:none;z-index:0;opacity:.08;animation:drift 18s ease-in-out infinite alternate}
.b1{width:600px;height:600px;background:#3b82f6;top:-200px;left:-150px}
.b2{width:400px;height:400px;background:#10b981;bottom:-120px;right:-100px;animation-delay:-8s}
.b3{width:300px;height:300px;background:#f59e0b;top:40%;left:60%;animation-delay:-14s;opacity:.05}
@keyframes drift{to{transform:translate(30px,20px) scale(1.07)}}

/* ── shell ── */
#shell{position:relative;z-index:1;display:flex;height:100vh;overflow:hidden}

/* ══════════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════════ */
#sidebar{
  width:270px;min-width:270px;
  display:flex;flex-direction:column;
  background:var(--s1);border-right:1px solid var(--border);
  padding:24px 16px 20px;gap:16px;
  transition:transform .28s ease;
}

.logo{display:flex;align-items:center;gap:10px}
.logo-icon{
  width:40px;height:40px;border-radius:12px;flex-shrink:0;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  display:flex;align-items:center;justify-content:center;font-size:20px;
  box-shadow:0 6px 24px rgba(59,130,246,.3)
}
.logo-text{font-family:var(--fh);font-size:18px;font-weight:700;letter-spacing:-.5px}
.logo-text span{background:linear-gradient(90deg,#63b3ed,#68d391);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* ── mode tabs ── */
.mode-label{font-family:var(--fm);font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);padding:0 4px}

.mode-tabs{display:flex;flex-direction:column;gap:6px}
.mt{
  display:flex;align-items:center;gap:10px;
  padding:11px 13px;border-radius:11px;
  border:1px solid var(--border);background:var(--s2);
  cursor:pointer;transition:all .2s;
}
.mt:hover{background:var(--s3)}
.mt.active-b{border-color:var(--a1);background:rgba(99,179,237,.1)}
.mt.active-s{border-color:var(--a2);background:rgba(104,211,145,.1)}
.mt.active-g{border-color:var(--a3);background:rgba(246,173,85,.1)}

.mt-icon{
  width:30px;height:30px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:15px;
  background:var(--s3);transition:background .2s;
}
.mt.active-b .mt-icon{background:rgba(99,179,237,.2)}
.mt.active-s .mt-icon{background:rgba(104,211,145,.2)}
.mt.active-g .mt-icon{background:rgba(246,173,85,.2)}
.mt-info{flex:1;min-width:0}
.mt-name{font-family:var(--fb);font-size:13px;font-weight:700;color:var(--mid);transition:color .2s}
.mt.active-b .mt-name{color:var(--a1)}
.mt.active-s .mt-name{color:var(--a2)}
.mt.active-g .mt-name{color:var(--a3)}
.mt-desc{font-family:var(--fm);font-size:10px;color:var(--muted);margin-top:1px}

/* ── progress panel ── */
.sb-section-label{font-family:var(--fm);font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);padding:0 4px;margin-top:4px}

#progress-wrap{display:flex;flex-direction:column;gap:5px}
.step{
  display:flex;align-items:center;gap:9px;
  padding:8px 11px;border-radius:10px;
  border:1px solid var(--border);background:var(--s2);
  transition:all .22s;
}
.step.active{border-color:var(--a1);background:rgba(99,179,237,.09)}
.step.done  {border-color:rgba(104,211,145,.3);background:rgba(104,211,145,.05)}
.step.seo-active{border-color:var(--a2);background:rgba(104,211,145,.09)}
.step.gen-active{border-color:var(--a3);background:rgba(246,173,85,.09)}
.sn{
  width:20px;height:20px;border-radius:5px;flex-shrink:0;
  background:var(--s3);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--fm);font-size:9px;color:var(--muted);transition:all .22s;
}
.step.active .sn  {background:var(--a1);border-color:var(--a1);color:#000}
.step.done   .sn  {background:var(--a2);border-color:var(--a2);color:#000}
.step.seo-active .sn{background:var(--a2);border-color:var(--a2);color:#000}
.step.gen-active .sn{background:var(--a3);border-color:var(--a3);color:#000}
.si{flex:1;min-width:0}
.st{font-size:11.5px;font-weight:700;color:var(--mid);transition:color .22s}
.step.active .st  {color:var(--a1)}
.step.done   .st  {color:var(--a2)}
.step.seo-active .st{color:var(--a2)}
.step.gen-active .st{color:var(--a3)}
.sv{font-family:var(--fm);font-size:9.5px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.sess-row{margin-top:auto;padding-top:12px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sess-tag{font-family:var(--fm);font-size:9.5px;color:var(--muted)}
.sess-tag span{color:var(--a2)}

/* ══════════════════════════════════════════════
   MAIN
══════════════════════════════════════════════ */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* topbar */
#topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;border-bottom:1px solid var(--border);
  background:var(--s1);gap:12px;flex-shrink:0;
}
#hamburger{display:none;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:2px 6px}
.top-left{display:flex;align-items:center;gap:10px}
.mode-badge{
  font-family:var(--fm);font-size:10px;font-weight:500;
  padding:4px 10px;border-radius:20px;
  border:1px solid var(--border);
  transition:all .3s;
}
.badge-b{border-color:var(--a1);color:var(--a1);background:rgba(99,179,237,.08)}
.badge-s{border-color:var(--a2);color:var(--a2);background:rgba(104,211,145,.08)}
.badge-g{border-color:var(--a3);color:var(--a3);background:rgba(246,173,85,.08)}

.dot{width:7px;height:7px;border-radius:50%;background:var(--a2);box-shadow:0 0 7px var(--a2);animation:blink 2.5s ease-in-out infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.top-title{font-family:var(--fh);font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}

.top-actions{display:flex;gap:7px}
.tb-btn{
  background:var(--s2);border:1px solid var(--border);color:var(--mid);
  border-radius:9px;padding:6px 13px;font-size:12.5px;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:all .2s;font-family:var(--fb);
}
.tb-btn:hover{border-color:var(--a1);color:var(--a1)}

/* ── messages ── */
#messages{
  flex:1;overflow-y:auto;padding:22px 24px 10px;
  display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;
}
#messages::-webkit-scrollbar{width:3px}
#messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* welcome */
#welcome{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;gap:20px;text-align:center;padding:30px 20px;animation:up .5s ease both;
}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.w-badge{font-family:var(--fm);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:5px 14px;border:1px solid var(--border);border-radius:20px}
.w-icon{
  width:68px;height:68px;border-radius:20px;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  display:flex;align-items:center;justify-content:center;font-size:32px;
  box-shadow:0 16px 44px rgba(59,130,246,.25);
}
.w-title{font-family:var(--fh);font-size:28px;font-weight:700;letter-spacing:-.8px;line-height:1.15}
.w-sub{font-size:14px;color:var(--mid);max-width:400px;line-height:1.65}

/* mode cards */
.mode-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:640px;width:100%}
.mc{
  background:var(--s2);border:1px solid var(--border);border-radius:14px;
  padding:18px 16px;cursor:pointer;text-align:center;
  transition:all .22s;display:flex;flex-direction:column;align-items:center;gap:8px;
}
.mc:hover{transform:translateY(-3px)}
.mc.mc-b:hover{border-color:var(--a1);background:rgba(99,179,237,.08)}
.mc.mc-s:hover{border-color:var(--a2);background:rgba(104,211,145,.08)}
.mc.mc-g:hover{border-color:var(--a3);background:rgba(246,173,85,.08)}
.mc-emoji{font-size:26px}
.mc-label{font-family:var(--fh);font-size:13px;font-weight:600;color:var(--text)}
.mc-hint {font-family:var(--fm);font-size:10px;color:var(--muted);line-height:1.4}

/* messages */
.msg{display:flex;gap:10px;animation:up .28s ease both;max-width:820px}
.msg.user{flex-direction:row-reverse;align-self:flex-end}
.msg.bot {align-self:flex-start}

.av{
  width:30px;height:30px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:14px;
}
.av.bot-av {background:linear-gradient(135deg,#3b82f6,#8b5cf6);box-shadow:0 3px 10px rgba(59,130,246,.25)}
.av.user-av{background:var(--s2);border:1px solid var(--border)}

.bubble{
  padding:11px 15px;border-radius:var(--r);
  font-size:13.5px;line-height:1.7;max-width:620px;word-break:break-word;
}
.msg.bot  .bubble{background:var(--bot-bg);border:1px solid var(--border);border-radius:var(--r) var(--r) var(--r) 3px}
.msg.user .bubble{background:var(--user-bg);border:1px solid rgba(99,179,237,.18);border-radius:var(--r) var(--r) 3px var(--r)}

/* ── plan card ── */
.plan-card{
  background:var(--s2);border:1px solid rgba(99,179,237,.3);
  border-radius:var(--r);padding:14px 17px;margin-top:9px;
  display:flex;flex-direction:column;gap:8px;
}
.plan-card h4{font-family:var(--fh);font-size:12.5px;color:var(--a1);letter-spacing:.5px;margin-bottom:3px}
.pr{display:flex;gap:8px;font-size:12.5px;align-items:flex-start}
.pk{color:var(--muted);min-width:80px;font-family:var(--fm);font-size:11px;padding-top:1px}
.pv{color:var(--text);flex:1}
.plan-ai{
  margin-top:6px;padding-top:10px;border-top:1px solid var(--border);
  font-size:12.5px;color:var(--mid);line-height:1.65;white-space:pre-wrap;
}

/* ── seo card ── */
.seo-card{
  background:var(--s2);border:1px solid rgba(104,211,145,.3);
  border-radius:var(--r);padding:14px 17px;margin-top:9px;
  white-space:pre-wrap;font-size:12.5px;line-height:1.75;color:var(--mid);
  font-family:var(--fm);
}
.seo-card .seo-title{font-family:var(--fh);font-size:14px;color:var(--a2);margin-bottom:8px;font-weight:600}

/* ── website preview card ── */
.gen-card{
  background:var(--s2);border:1px solid rgba(246,173,85,.3);
  border-radius:var(--r);padding:14px 17px;margin-top:9px;
  display:flex;flex-direction:column;gap:10px;
}
.gen-card h4{font-family:var(--fh);font-size:12.5px;color:var(--a3);letter-spacing:.5px}
.preview-frame{
  width:100%;height:280px;border-radius:10px;
  border:1px solid var(--border);overflow:hidden;background:#fff;
}
.gen-actions{display:flex;gap:8px;flex-wrap:wrap}
.gen-btn{
  padding:7px 14px;border-radius:9px;border:none;cursor:pointer;
  font-family:var(--fb);font-size:12px;font-weight:700;
  transition:opacity .2s,transform .15s;
}
.gen-btn:hover{opacity:.85;transform:translateY(-1px)}
.gen-btn-dl{background:var(--a3);color:#000}
.gen-btn-pv{background:var(--s3);color:var(--text);border:1px solid var(--border)}

/* typing */
.typing{display:flex;align-items:center;gap:5px;padding:12px 15px}
.td{width:6px;height:6px;background:var(--a1);border-radius:50%;animation:bounce 1.1s ease-in-out infinite}
.td:nth-child(2){animation-delay:.18s}.td:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-6px);opacity:1}}

/* ── input area ── */
#input-area{padding:12px 24px 18px;background:var(--s1);border-top:1px solid var(--border);flex-shrink:0}
.iw{
  display:flex;align-items:flex-end;gap:8px;
  background:var(--s2);border:1px solid var(--border);
  border-radius:14px;padding:8px 8px 8px 15px;
  transition:border-color .2s,box-shadow .2s;
}
.iw:focus-within{border-color:var(--a1);box-shadow:0 0 0 3px rgba(99,179,237,.09)}
#user-input{
  flex:1;background:none;border:none;outline:none;color:var(--text);
  font-family:var(--fb);font-size:13.5px;resize:none;
  min-height:21px;max-height:120px;line-height:1.5;padding:2px 0;
}
#user-input::placeholder{color:var(--muted)}
#send-btn{
  width:36px;height:36px;background:linear-gradient(135deg,#3b82f6,#6d28d9);
  border:none;border-radius:9px;color:#fff;font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:opacity .2s,transform .15s;
}
#send-btn:hover {opacity:.82;transform:scale(1.05)}
#send-btn:active{transform:scale(.97)}
#send-btn:disabled{opacity:.3;cursor:not-allowed;transform:none}

.ifooter{display:flex;align-items:center;justify-content:space-between;margin-top:7px;padding:0 3px}
.ihint{font-family:var(--fm);font-size:10px;color:var(--muted)}
.icount{font-family:var(--fm);font-size:10px;color:var(--muted)}

/* toast */
#toast{
  position:fixed;bottom:26px;right:26px;z-index:10000;
  padding:10px 16px;border-radius:11px;font-size:12.5px;
  opacity:0;transform:translateY(12px);transition:all .3s;pointer-events:none;
}
#toast.err {background:#2a0e18;border:1px solid var(--red);color:var(--red)}
#toast.ok  {background:#0a2018;border:1px solid var(--a2);color:var(--a2)}
#toast.show{opacity:1;transform:translateY(0)}

/* mobile overlay */
#sbo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100}

/* ── responsive ── */
@media(max-width:700px){
  #sidebar{position:fixed;left:0;top:0;bottom:0;z-index:200;transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #hamburger{display:block}
  #sbo.open{display:block}
  #messages{padding:14px 12px 8px}
  #input-area{padding:10px 12px 15px}
  #topbar{padding:12px 14px}
  .mode-cards{grid-template-columns:1fr}
  .bubble{max-width:82vw}
  .preview-frame{height:200px}
}
</style>
</head>
<body>
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>
<div id="sbo"></div>

<div id="shell">

<!-- ══════════ SIDEBAR ══════════ -->
<aside id="sidebar">
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <div class="logo-text">Site<span>Bot AI</span></div>
  </div>

  <div class="mode-label">Choose Mode</div>

  <div class="mode-tabs">
    <div class="mt active-b" id="tab-b" onclick="switchMode('builder')">
      <div class="mt-icon">🏗️</div>
      <div class="mt-info">
        <div class="mt-name">Website Builder</div>
        <div class="mt-desc">5-step website plan</div>
      </div>
    </div>
    <div class="mt" id="tab-s" onclick="switchMode('seo')">
      <div class="mt-icon">📈</div>
      <div class="mt-info">
        <div class="mt-name">SEO & Marketing</div>
        <div class="mt-desc">Full strategy report</div>
      </div>
    </div>
    <div class="mt" id="tab-g" onclick="switchMode('generate')">
      <div class="mt-icon">⚡</div>
      <div class="mt-info">
        <div class="mt-name">Generate Website</div>
        <div class="mt-desc">Full HTML in seconds</div>
      </div>
    </div>
  </div>

  <div class="sb-section-label" id="progress-label">Progress</div>
  <div id="progress-wrap"></div>

  <div class="sess-row">
    <div class="sess-tag">Session: <span id="sessId">—</span></div>
  </div>
</aside>

<!-- ══════════ MAIN ══════════ -->
<main id="main">
  <div id="topbar">
    <div class="top-left">
      <button id="hamburger">☰</button>
      <div class="dot"></div>
      <div class="top-title" id="topTitle">AI Website Consultant</div>
      <div class="mode-badge badge-b" id="modeBadge">BUILDER</div>
    </div>
    <div class="top-actions">
      <button class="tb-btn" id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <div class="iw">
      <textarea id="user-input" rows="1" placeholder="Type your answer or ask anything…" autocomplete="off" spellcheck="false"></textarea>
      <button id="send-btn">➤</button>
    </div>
    <div class="ifooter">
      <span class="ihint">Enter to send · Shift+Enter = new line</span>
      <span class="icount" id="charCount">0 / 1000</span>
    </div>
  </div>
</main>
</div>

<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════ */
const API = "http://127.0.0.1:8000";

/* ── state ── */
let sessionId  = getOrCreateSession();
let waiting    = false;
let currentMode = "builder";   // builder | seo | generate
let stepIdx    = 0;
const answers  = {};

/* session */
function getOrCreateSession(){
  let id = localStorage.getItem("sb3_session");
  if(!id){ id="sess_"+Math.random().toString(36).slice(2,14); localStorage.setItem("sb3_session",id); }
  return id;
}
function freshSession(){
  localStorage.removeItem("sb3_session");
  sessionId=getOrCreateSession();
  stepIdx=0;
  Object.keys(answers).forEach(k=>delete answers[k]);
  document.getElementById("sessId").textContent=sessionId.slice(-8);
}

document.getElementById("sessId").textContent=sessionId.slice(-8);

/* ══════════════════════════════════════════════════
   PROGRESS STEPS per mode
══════════════════════════════════════════════════ */
const STEPS = {
  builder: [
    {label:"Business Type"},{label:"Website Goal"},
    {label:"Pages Needed"},{label:"Tech Stack"},{label:"Design Style"}
  ],
  seo: [
    {label:"Business Name"},{label:"Industry/Niche"},
    {label:"Target Audience"},{label:"Geographic Target"},{label:"Main Challenge"}
  ],
  generate: [
    {label:"Business Name"},{label:"Tagline/Description"},
    {label:"Pages List"},{label:"Color Scheme"},{label:"Extra Sections"}
  ]
};

function renderSidebar(){
  const steps = STEPS[currentMode];
  const wrap  = document.getElementById("progress-wrap");
  wrap.innerHTML = "";
  steps.forEach((s,i)=>{
    const el = document.createElement("div");
    let cls = "step";
    if(i < stepIdx) cls += " done";
    else if(i === stepIdx){
      cls += currentMode==="builder" ? " active"
           : currentMode==="seo"     ? " seo-active"
           :                           " gen-active";
    }
    el.className = cls;
    el.id = `step-${i}`;
    const val = i < stepIdx ? trunc(answers[i]||"✓",18) : (i===stepIdx?"waiting…":"—");
    el.innerHTML = `<div class="sn">${i<stepIdx?"✓":i+1}</div>
      <div class="si"><div class="st">${s.label}</div><div class="sv">${val}</div></div>`;
    wrap.appendChild(el);
  });
}

const trunc = (s,n) => String(s).length>n ? String(s).slice(0,n)+"…" : String(s);

/* ══════════════════════════════════════════════════
   SEND
══════════════════════════════════════════════════ */
async function sendMessage(){
  const text = document.getElementById("user-input").value.trim();
  if(!text||waiting) return;
  if(text.length>1000){ toast("Message too long","err"); return; }

  const w=document.getElementById("welcome"); if(w) w.remove();
  appendMsg("user",text);
  document.getElementById("user-input").value="";
  document.getElementById("user-input").style.height="auto";
  document.getElementById("charCount").textContent="0 / 1000";

  if(stepIdx<STEPS[currentMode].length) answers[stepIdx]=text;

  waiting=true;
  document.getElementById("send-btn").disabled=true;
  const tid=showTyping();

  try{
    const res = await fetch(`${API}/chat`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({session_id:sessionId, message:text})
    });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const reply = (data.reply||"").trim();

    removeTyping(tid);
    if(stepIdx<STEPS[currentMode].length) stepIdx++;
    renderSidebar();

    // ── special render based on reply prefix ──
    if(reply.startsWith("WEBSITE_PLAN_READY\n")){
      renderPlanCard(reply.replace("WEBSITE_PLAN_READY\n",""));
    } else if(reply.startsWith("SEO_STRATEGY_READY\n")){
      renderSeoCard(reply.replace("SEO_STRATEGY_READY\n",""));
    } else if(reply.startsWith("WEBSITE_GENERATED\n")){
      renderWebsiteCard(reply.replace("WEBSITE_GENERATED\n",""));
    } else {
      appendMsg("bot",reply);
    }
  } catch(err){
    removeTyping(tid);
    toast(`Cannot reach backend at ${API}`, "err");
    appendMsg("bot","⚠️ Server error. Make sure your FastAPI backend is running at "+API);
  } finally{
    waiting=false;
    document.getElementById("send-btn").disabled=false;
    document.getElementById("user-input").focus();
  }
}

/* ══════════════════════════════════════════════════
   RENDER: GENERATED WEBSITE CARD
══════════════════════════════════════════════════ */
let generatedHTML = "";
function renderWebsiteCard(html){
  generatedHTML = html;
  const d=document.createElement("div"); d.className="msg bot";
  d.innerHTML=`
    <div class="av bot-av">🤖</div>
    <div class="bubble">
      🌐 Your website is ready!
      <div class="gen-card">
        <h4>✦ GENERATED WEBSITE PREVIEW</h4>
        <iframe class="preview-frame" id="previewFrame" sandbox="allow-scripts allow-same-origin"></iframe>
        <div class="gen-actions">
          <button class="gen-btn gen-btn-dl" onclick="downloadWebsite()">⬇ Download HTML</button>
          <button class="gen-btn gen-btn-pv" onclick="openFullPreview()">↗ Open Full Preview</button>
        </div>
      </div>
      <br>✏️ Ask me to modify anything — colors, sections, content!
    </div>`;
  document.getElementById("messages").appendChild(d);
  scroll();

  // inject into iframe after DOM paint
  requestAnimationFrame(()=>{
    const iframe = document.getElementById("previewFrame");
    if(iframe){
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      doc.open(); doc.write(html); doc.close();
    }
  });

  STEPS.generate.forEach((_,i)=>{ if(!answers[i]) answers[i]="✓"; });
  stepIdx=5; renderSidebar();
}

function downloadWebsite(){
  if(!generatedHTML){ toast("No website generated yet","err"); return; }
  const a=document.createElement("a");
  a.href = URL.createObjectURL(new Blob([generatedHTML],{type:"text/html"}));
  a.download = "my-website.html";
  a.click();
  toast("Website downloaded! ✓","ok");
}

function openFullPreview(){
  if(!generatedHTML){ toast("No website generated yet","err"); return; }
  const w=window.open("","_blank");
  w.document.write(generatedHTML);
  w.document.close();
}

/* ══════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════ */
function appendMsg(role,text){
  const d=document.createElement("div"); d.className=`msg ${role}`;
  d.innerHTML=`
    <div class="av ${role==="bot"?"bot-av":"user-av"}">${role==="bot"?"🤖":"👤"}</div>
    <div class="bubble">${role==="bot"?fmt(text):esc(text)}</div>`;
  document.getElementById("messages").appendChild(d); scroll(); return d;
}
function showTyping(){
  const id="t"+Date.now(); const d=document.createElement("div");
  d.className="msg bot"; d.id=id;
  d.innerHTML=`<div class="av bot-av">🤖</div><div class="bubble"><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>`;
  document.getElementById("messages").appendChild(d); scroll(); return id;
}
function removeTyping(id){ const e=document.getElementById(id); if(e)e.remove(); }
function scroll(){ const m=document.getElementById("messages"); m.scrollTop=m.scrollHeight; }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmt(t){
  return esc(t)
    .replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
    .replace(/^[•\-]\s/gm,"&bull; ")
    .replace(/\n/g,"<br>");
}

let toastT;
function toast(msg,type="err"){
  const el=document.getElementById("toast");
  el.textContent=msg; el.className=type+" show";
  clearTimeout(toastT); toastT=setTimeout(()=>{ el.className=type; },3200);
}

showWelcome();
